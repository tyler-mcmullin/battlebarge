<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BattleBarge — Sign In</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@400;500&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: #0d0d0f;
            color: #e8e4da;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            width: 100%;
            max-width: 420px;
            border: 1px solid #2a2a2e;
            background: #13131a;
            padding: 2.5rem;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: #c9a84c;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            font-size: 12px;
            color: #5a5a6a;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
        }

        label {
            display: block;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #5a5a6a;
            margin-bottom: 0.4rem;
        }

        input {
            width: 100%;
            background: #0d0d0f;
            border: 1px solid #2a2a2e;
            color: #e8e4da;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            padding: 0.65rem 0.85rem;
            margin-bottom: 1rem;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus {
            border-color: #c9a84c;
        }

        input::placeholder {
            color: #3a3a4a;
        }

        .btn-primary {
            width: 100%;
            background: #c9a84c;
            color: #0d0d0f;
            border: none;
            font-family: 'Cinzel', serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.1em;
            padding: 0.75rem;
            cursor: pointer;
            transition: background 0.15s;
            margin-bottom: 0.75rem;
        }

        .btn-primary:hover {
            background: #e0bc5e;
        }

        .btn-primary:disabled {
            background: #3a3a2a;
            color: #5a5a4a;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.25rem 0;
            color: #2a2a2e;
            font-size: 11px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2a2a2e;
        }

        .btn-google {
            width: 100%;
            background: transparent;
            border: 1px solid #2a2a2e;
            color: #e8e4da;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            padding: 0.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: border-color 0.15s, background 0.15s;
        }

        .btn-google:hover {
            border-color: #5a5a6a;
            background: #1a1a22;
        }

        .error-msg {
            font-size: 12px;
            color: #c0392b;
            margin-bottom: 1rem;
            display: none;
        }

        .token-section {
            margin-top: 2rem;
            display: none;
        }

        .token-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .token-label {
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #5a5a6a;
        }

        .user-info {
            font-size: 12px;
            color: #c9a84c;
        }

        .token-box {
            background: #0d0d0f;
            border: 1px solid #2a2a2e;
            padding: 0.75rem;
            font-family: monospace;
            font-size: 10px;
            color: #5a8a5a;
            word-break: break-all;
            max-height: 80px;
            overflow-y: auto;
            margin-bottom: 0.75rem;
            line-height: 1.5;
        }

        .btn-copy {
            width: 100%;
            background: transparent;
            border: 1px solid #2a2a2e;
            color: #c9a84c;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            letter-spacing: 0.08em;
            padding: 0.6rem;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            margin-bottom: 0.5rem;
        }

        .btn-copy:hover {
            border-color: #c9a84c;
            background: #1a1a12;
        }

        .btn-signout {
            width: 100%;
            background: transparent;
            border: 1px solid #2a2a2e;
            color: #5a5a6a;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            padding: 0.6rem;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .btn-signout:hover {
            border-color: #5a5a6a;
            color: #e8e4da;
        }

        .toggle {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 12px;
            color: #5a5a6a;
        }

        .toggle a {
            color: #c9a84c;
            cursor: pointer;
            text-decoration: none;
        }

        .toggle a:hover {
            text-decoration: underline;
        }

        .config-notice {
            background: #1a1208;
            border: 1px solid #3a2a08;
            padding: 0.75rem;
            font-size: 11px;
            color: #8a7a4a;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            display: none;
        }

        .config-notice code {
            color: #c9a84c;
            font-family: monospace;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="logo">BattleBarge</div>
        <div class="subtitle">Crusade Campaign Manager</div>

        <div class="config-notice" id="config-notice">
            Replace the Firebase config in the script below with your project's config from the <a
                href="https://console.firebase.google.com" target="_blank" style="color:#c9a84c;">Firebase Console</a> →
            Project Settings → Your apps.
        </div>

        <div id="auth-section">
            <div id="error-msg" class="error-msg"></div>

            <div id="login-form">
                <label>Email</label>
                <input type="email" id="email" placeholder="commander@battlebarge.gg" />
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" />
                <button class="btn-primary" onclick="signIn()">Sign in</button>

                <div class="divider">or</div>

                <button class="btn-google" onclick="signInGoogle()">
                    <svg width="16" height="16" viewBox="0 0 48 48">
                        <path fill="#EA4335"
                            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                        <path fill="#4285F4"
                            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                        <path fill="#FBBC05"
                            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                        <path fill="#34A853"
                            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                    </svg>
                    Continue with Google
                </button>

                <div class="toggle">No account? <a onclick="toggleForm()">Register</a></div>
            </div>

            <div id="register-form" style="display:none;">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="commander@battlebarge.gg" />
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Min. 6 characters" />
                <button class="btn-primary" onclick="register()">Create account</button>
                <div class="toggle">Have an account? <a onclick="toggleForm()">Sign in</a></div>
            </div>
        </div>

        <div class="token-section" id="token-section">
            <div class="token-header">
                <span class="token-label">JWT Token</span>
                <span class="user-info" id="user-email"></span>
            </div>
            <div class="token-box" id="token-box"></div>
            <button class="btn-copy" onclick="copyToken()" id="copy-btn">Copy token</button>
            <button class="btn-signout" onclick="signOut()">Sign out</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import {
            getAuth,
            connectAuthEmulator,
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            signInWithPopup,
            GoogleAuthProvider,
            signOut as fbSignOut,
            onAuthStateChanged
        } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "fake-api-key",
            authDomain: "localhost",
            projectId: "battlebarge-75869",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        connectAuthEmulator(auth, "http://localhost:9099");
        const provider = new GoogleAuthProvider();

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function clearError() {
            const el = document.getElementById('error-msg');
            el.style.display = 'none';
        }

        async function showToken(user) {
            const token = await user.getIdToken();
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('token-section').style.display = 'block';
            document.getElementById('token-box').textContent = token;
            document.getElementById('user-email').textContent = user.email || user.displayName;
        }

        onAuthStateChanged(auth, user => {
            if (user) showToken(user);
            else {
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('token-section').style.display = 'none';
            }
        });

        window.signIn = async () => {
            clearError();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (e) {
                showError(e.message);
            }
        };

        window.register = async () => {
            clearError();
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            try {
                await createUserWithEmailAndPassword(auth, email, password);
            } catch (e) {
                showError(e.message);
            }
        };

        window.signInGoogle = async () => {
            clearError();
            try {
                await signInWithPopup(auth, provider);
            } catch (e) {
                showError(e.message);
            }
        };

        window.signOut = async () => {
            await fbSignOut(auth);
        };

        window.copyToken = async () => {
            const token = document.getElementById('token-box').textContent;
            await navigator.clipboard.writeText(token);
            const btn = document.getElementById('copy-btn');
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy token', 2000);
        };

        window.toggleForm = () => {
            clearError();
            const login = document.getElementById('login-form');
            const reg = document.getElementById('register-form');
            login.style.display = login.style.display === 'none' ? 'block' : 'none';
            reg.style.display = reg.style.display === 'none' ? 'block' : 'none';
        };
    </script>
</body>

</html>
